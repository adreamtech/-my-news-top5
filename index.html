<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="聚合抖音、B站、快手、微博、小红书热点视频的手机端应用。" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>热点视频聚合</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <h1>热点视频聚合</h1>
        <button id="installButton" class="install-btn" hidden>安装 App</button>
      </header>

      <section class="search-card">
        <input id="keywordInput" type="text" placeholder="搜索视频关键词（如：春晚、AI、CBA）" />
        <button id="searchButton">全平台搜索</button>
      </section>

      <section class="platform-filter" id="platformFilter"></section>

      <main id="feed" class="feed" aria-live="polite"></main>

      <footer class="bottom-note">
        <p>数据说明：演示版使用平台热榜样例数据，点击即可跳转对应平台搜索/详情页。</p>
        <p id="updatedAt"></p>
      </footer>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
